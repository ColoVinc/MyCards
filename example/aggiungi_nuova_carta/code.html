<script>
        // Simple micro-interactions for the form inputs
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
                input.parentElement.classList.add('transition-transform');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Rarity chip selection logic
        const chips = document.querySelectorAll('.rounded-full.border');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => {
                    c.classList.remove('bg-primary', 'bg-secondary', 'bg-tertiary', 'text-white');
                    c.classList.add('text-primary', 'text-secondary', 'text-tertiary');
                });
                
                if (chip.innerText.includes('COMMON')) {
                    chip.classList.add('bg-primary', 'text-white');
                } else if (chip.innerText.includes('RARE')) {
                    chip.classList.add('bg-secondary', 'text-white');
                } else if (chip.innerText.includes('MYTHIC')) {
                    chip.classList.add('bg-tertiary', 'text-white');
                }
            });
        });

        // File input preview simulation
        const fileInputs = document.querySelectorAll('input[type="file"]');
        fileInputs.forEach(input => {
            input.addEventListener('change', (e) => {
                const container = input.nextElementSibling;
                const icon = container.querySelector('.material-symbols-outlined');
                const text = container.querySelector('.font-label-caps');
                
                if (e.target.files && e.target.files[0]) {
                    icon.innerText = 'check_circle';
                    icon.classList.add('text-primary');
                    text.innerText = 'FILE LOADED';
                    container.classList.add('border-primary/50');
                    container.classList.remove('border-dashed');
                }
            });
        });
    </script>
